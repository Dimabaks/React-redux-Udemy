<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Vanilla JS</title>
		<style>
			.app {
				text-align: center;
			}

			.green-btn {
				color: white;
				background-color: green;
			}
		</style>
	</head>
	<body>
		<div class="app">
			<button id="my-button" onclick="changeButton('my-button')">
				Click me
			</button>
		</div>
		<script>
			function changeButton(id) {
				const btn = document.querySelector("#my-button");
				btn.innerHTML = "Hello from Vanilla JS";
				btn.className = "green-btn";
			}
		</script>
	</body>
</html>
